modLoader = "javafml"
loaderVersion = "[1,)"
license = "MIT"
issueTrackerURL="https://github.com/JamCoreModding/right-click-harvest-supplementaries-compat/issues"

[[mods]]
modId = "rch_supplementaries_compat"
version = "${version}"
displayName = "RightClickHarvest Supplementaries Compat"
displayURL="https://github.com/JamCoreModding/right-click-harvest-supplementaries-compat"
logoFile = "icon.png"
authors = "Jamalam"
description = '''
Adds compatibility between RightClickHarvest and Supplementaries
'''

[[dependencies.rch_supplementaries_compat]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.rch_supplementaries_compat]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.rch_supplementaries_compat]]
modId = "rightclickharvest"
type = "required"
versionRange = "[${rch_version},)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.rch_supplementaries_compat]]
modId = "supplementaries"
type = "required"
versionRange = "[${supplementaries_version},)"
ordering = "AFTER"
side = "BOTH"

[[mixins]]
config = "rch_supplementaries_compat.mixins.json"
